[conf]
;port=/dev/ttyESP-58:8C:81:AA:17:80
port=/dev/ttyESP-50:78:7D:91:F2:1C

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1

framework = arduino
build_unflags = -std=gnu++11  # remove the default
build_flags = 
  -DARDUINO_USB_MODE=1 
  -DARDUINO_USB_CDC_ON_BOOT=1 
  -std=c++17
  -Ilib

lib_extra_dirs=../../device-lib
lib_ignore = quickjs_min
monitor_speed = 115200

upload_port=${conf.port}
monitor_port=${conf.port}
